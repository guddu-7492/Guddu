<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Music Sound</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header class="topbar">

<h2><i class="fa-solid fa-wave-square"></i> My Music Sound</h2>

<div class="menu">

<i class="fa-solid fa-house"></i>

<i class="fa-solid fa-magnifying-glass"></i>

<i class="fa-solid fa-sliders"></i>

<i class="fa-solid fa-gear"></i>

</div>

</header>

<div class="search">

<input type="text" placeholder="Search Music...">

</div>

<section class="splitter">

<div class="title">

<h2>🎵 AI Splitter</h2>

<button>How it works?</button>

</div>

<div class="upload">

<input type="file" id="audioFile">

</div>

<div class="wave">

Sample Song.mp3

</div>

<div class="controls">

<button id="repeatBtn"><i class="fas fa-repeat"></i></button>

<button id="prevBtn"><i class="fas fa-backward-step"></i></button>

<button id="playBtn"><i class="fas fa-play"></i></button>

<button id="nextBtn"><i class="fas fa-forward-step"></i></button>

<button id="shuffleBtn"><i class="fas fa-shuffle"></i></button>

</div>
<div class="player-info">
    <span id="currentTime">00:00</span>

    <input type="range" id="progressBar" value="0">

    <span id="totalTime">00:00</span>
</div>

<div class="volume-box">
    🔊
    <input type="range" id="volumeBar" min="0" max="100" value="100">
    <button id="muteBtn">Mute</button>
</div>

<div class="slider">

<label>Vocals</label>

<input type="range" value="80">

</div>

<div class="slider">

<label>Drums</label>

<input type="range" value="80">

</div>

<div class="slider">

<label>Bass</label>

<input type="range" value="80">

</div>

<div class="slider">

<label>Others</label>

<input type="range" value="80">

</div>

<button class="splitBtn">

✂ Split Song

</button>

</section>

<div class="cards">

<div class="card">🎤 AI Splitter</div>

<div class="card">🎵 Music</div>

<div class="card">⬇ Downloads</div>

<div class="card">❤ Favorites</div>

</div>

<script src="script.js"></script>

</body>
</html>
